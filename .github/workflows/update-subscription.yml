name: Update FLClash Subscription

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml
    
    - name: Update FLClash subscription
      run: python merger.py
    
    - name: Generate encoded subscription
      run: python encoder.py
    
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Добавляем только существующие файлы
        git add merged_flclash.yaml merged_flclash_base64.txt servers_history.json 2>/dev/null || true
        
        # Проверяем существует ли subscription_info.txt
        if [ -f subscription_info.txt ]; then
          git add subscription_info.txt
        fi
        
        # Проверяем есть ли изменения
        if git diff --staged --quiet; then
          echo "✅ No changes to commit"
        else
          echo "📤 Committing changes..."
          git commit -m "🔄 Auto-update $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "✅ Changes pushed successfully"
        fi
      shell: bash
