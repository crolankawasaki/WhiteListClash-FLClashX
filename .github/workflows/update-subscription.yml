name: Update FLClash Subscription

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'

# Важно: даем права на запись
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml
    
    - name: Update FLClash subscription
      run: python merger.py
    
    - name: Generate encoded subscription
      run: python encoder.py
    
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Проверяем есть ли изменения
        if [[ -n $(git status --porcelain) ]]; then
          echo "📤 Есть изменения, коммитим..."
          git add merged_flclash.yaml merged_flclash_base64.txt servers_history.json subscription_info.txt
          git commit -m "🔄 Auto-update $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "✅ Изменения запушены"
        else
          echo "✅ Нет изменений для коммита"
        fi
      shell: bash
